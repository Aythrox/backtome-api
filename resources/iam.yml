role:
  statements:
    - Effect: Allow
      Action:
        - dynamodb:Query
        - dynamodb:Scan
        - dynamodb:GetItem
        - dynamodb:PutItem
        - dynamodb:UpdateItem
        - dynamodb:DeleteItem
      Resource:
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.USERS_TABLE}*"
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SUBJECTS_TABLE}*"
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.ALERTS_TABLE}*"
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.SIGHTINGS_TABLE}*"
        - "arn:aws:dynamodb:${self:provider.region}:*:table/${self:provider.environment.MESSAGES_TABLE}*"
