UsersTable:
  Type: AWS::DynamoDB::Table
  Properties:
    TableName: ${self:provider.environment.USERS_TABLE}
    AttributeDefinitions:
      - AttributeName: user_id
        AttributeType: S
    KeySchema:
      - AttributeName: user_id
        KeyType: HASH
    BillingMode: PAY_PER_REQUEST

SubjectsTable:
  Type: AWS::DynamoDB::Table
  Properties:
    TableName: ${self:provider.environment.SUBJECTS_TABLE}
    AttributeDefinitions:
      - AttributeName: subject_id
        AttributeType: S
      - AttributeName: owner_id
        AttributeType: S
      - AttributeName: created_at
        AttributeType: S
    KeySchema:
      - AttributeName: subject_id
        KeyType: HASH
    GlobalSecondaryIndexes:
      - IndexName: OwnerIndex
        KeySchema:
          - AttributeName: owner_id
            KeyType: HASH
          - AttributeName: created_at
            KeyType: RANGE
        Projection:
          ProjectionType: ALL
    BillingMode: PAY_PER_REQUEST

AlertsTable:
  Type: AWS::DynamoDB::Table
  Properties:
    TableName: ${self:provider.environment.ALERTS_TABLE}
    AttributeDefinitions:
      - AttributeName: alert_id
        AttributeType: S
      - AttributeName: owner_id
        AttributeType: S
      - AttributeName: created_at
        AttributeType: S
      - AttributeName: geohash_prefix
        AttributeType: S
      - AttributeName: geohash
        AttributeType: S
    KeySchema:
      - AttributeName: alert_id
        KeyType: HASH
    GlobalSecondaryIndexes:
      - IndexName: OwnerIndex
        KeySchema:
          - AttributeName: owner_id
            KeyType: HASH
          - AttributeName: created_at
            KeyType: RANGE
        Projection:
          ProjectionType: ALL
      - IndexName: LocationIndex
        KeySchema:
          - AttributeName: geohash_prefix
            KeyType: HASH
          - AttributeName: geohash
            KeyType: RANGE
        Projection:
          ProjectionType: ALL
    BillingMode: PAY_PER_REQUEST

SightingsTable:
  Type: AWS::DynamoDB::Table
  Properties:
    TableName: ${self:provider.environment.SIGHTINGS_TABLE}
    AttributeDefinitions:
      - AttributeName: sighting_id
        AttributeType: S
      - AttributeName: alert_id
        AttributeType: S
      - AttributeName: created_at
        AttributeType: S
    KeySchema:
      - AttributeName: sighting_id
        KeyType: HASH
    GlobalSecondaryIndexes:
      - IndexName: AlertIndex
        KeySchema:
          - AttributeName: alert_id
            KeyType: HASH
          - AttributeName: created_at
            KeyType: RANGE
        Projection:
          ProjectionType: ALL
    BillingMode: PAY_PER_REQUEST

MessagesTable:
  Type: AWS::DynamoDB::Table
  Properties:
    TableName: ${self:provider.environment.MESSAGES_TABLE}
    AttributeDefinitions:
      - AttributeName: message_id
        AttributeType: S
      - AttributeName: alert_id
        AttributeType: S
      - AttributeName: created_at
        AttributeType: S
    KeySchema:
      - AttributeName: message_id
        KeyType: HASH
    GlobalSecondaryIndexes:
      - IndexName: AlertIndex
        KeySchema:
          - AttributeName: alert_id
            KeyType: HASH
          - AttributeName: created_at
            KeyType: RANGE
        Projection:
          ProjectionType: ALL
    BillingMode: PAY_PER_REQUEST
